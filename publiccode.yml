publiccodeYmlVersion: "0.5"

name: Developer.overheid.nl Agent Skills
url: "https://github.com/developer-overheid-nl/skills-developer-overheid-nl"

# Todo: make a page about these skills on the knowledge base (https://developer.overheid.nl/kennisbank/ai/toosl/nl-agentic-skills)
landingURL: "https://developer.overheid.nl"

softwareType: addon

platforms:
  - linux
  - windows
  - mac

categories:
  - it-development
  - knowledge-management

developmentStatus: beta

description:
  nl:
    longDescription: |
      Agent Skills voor de kennisbank van developer.overheid.nl. Deze skills
      bieden begeleiding op het gebied van API-ontwerp, open source,
      beveiliging, infrastructuur, data, front-end en programmeertalen voor
      overheidsprojecten.
    shortDescription: >-
      Agent Skills voor de kennisbank van developer.overheid.nl voor
      Nederlandse overheidsprojecten.
    features:
      - API design rules en OpenAPI standaarden
      - Open source richtlijnen en publiccode.yml
      - Beveiliging en authenticatie (DigiD, eHerkenning, OAuth, OIDC)
      - Infrastructuur (Haven, FSC)
      - Data standaarden
      - Front-end standaarden en NL Design System
      - Programmeertaal richtlijnen
  en:
    longDescription: |
      Agent Skills for the Dutch Government Developer Portal
      (developer.overheid.nl) knowledge base. These skills provide guidance on
      API design, open source, security, infrastructure, data, front-end, and
      programming languages for Dutch government projects.
    shortDescription: >-
      Agent Skills for the developer.overheid.nl knowledge base for Dutch
      government projects.
    features:
      - API design rules and OpenAPI standards
      - Open source guidelines and publiccode.yml
      - Security and authentication (DigiD, eHerkenning, OAuth, OIDC)
      - Infrastructure (Haven, FSC)
      - Data standards
      - Front-end standards and NL Design System
      - Programming language guidelines

